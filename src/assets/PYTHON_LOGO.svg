<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" role="img" aria-labelledby="title desc">
  <title id="title">Python style placeholder logo</title>
  <desc id="desc">Blue and yellow rounded blocks inspired by Python branding</desc>
  <defs>
    <linearGradient id="blueGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#4B8BBE"/>
      <stop offset="100%" stop-color="#306998"/>
    </linearGradient>
    <linearGradient id="yellowGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#FFE873"/>
      <stop offset="100%" stop-color="#FFD43B"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="640" height="640" fill="#111827"/>

  <g filter="url(#shadow)">
    <path
      d="M164 124h174c55 0 96 38 96 94v92H250c-38 0-66 28-66 66v40H148c-54 0-96-38-96-94V220c0-58 46-96 112-96z"
      fill="url(#blueGrad)"
      rx="44"
    />
    <circle cx="308" cy="202" r="18" fill="#ffffff"/>

    <path
      d="M476 516H302c-55 0-96-38-96-94v-92h184c38 0 66-28 66-66v-40h36c54 0 96 38 96 94v102c0 58-46 96-112 96z"
      fill="url(#yellowGrad)"
      rx="44"
    />
    <circle cx="332" cy="438" r="18" fill="#111827"/>
  </g>

  <text
    x="320"
    y="596"
    text-anchor="middle"
    font-family="Inter, Segoe UI, Arial, sans-serif"
    font-size="38"
    font-weight="700"
    letter-spacing="2"
    fill="#E5E7EB"
  >
    PYTHON
  </text>
</svg>
