<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Flutter and Dart placeholder logo</title>
  <desc id="desc">Split card with Flutter mark on left and Dart mark on right</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="flutterGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6DD5FA"/>
      <stop offset="100%" stop-color="#1AA6F7"/>
    </linearGradient>
    <linearGradient id="dartGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00C4B3"/>
      <stop offset="100%" stop-color="#0175C2"/>
    </linearGradient>
  </defs>

  <rect width="960" height="540" fill="url(#bg)"/>

  <rect x="44" y="44" width="872" height="452" rx="24" fill="#0B1220" stroke="#334155" stroke-width="2"/>
  <line x1="480" y1="70" x2="480" y2="470" stroke="#334155" stroke-width="2"/>

  <!-- Flutter side -->
  <g transform="translate(118 94)">
    <path d="M86 74 196 -36h109L141 128z" fill="#47C5FB"/>
    <path d="M86 258 141 203h164L196 312z" fill="#47C5FB"/>
    <path d="M141 203 196 148h109L250 203z" fill="#00569E"/>
    <path d="M141 203 196 258l54 54H141l-55-54z" fill="url(#flutterGrad)"/>
    <text x="150" y="372" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="42" font-weight="700" fill="#E2E8F0">FLUTTER</text>
  </g>

  <!-- Dart side -->
  <g transform="translate(564 108)">
    <path d="M56 198 180 74c38-38 94-38 132 0l36 36v146c0 24-20 44-44 44H160z" fill="url(#dartGrad)"/>
    <path d="M56 198 176 318h-74c-25 0-46-20-46-46z" fill="#00B4AB"/>
    <path d="M348 110 210 248h-154l138-138c38-38 94-38 132 0z" fill="#29B6F6" opacity="0.9"/>
    <text x="178" y="356" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="42" font-weight="700" fill="#E2E8F0">DART</text>
  </g>

  <text x="480" y="520" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" fill="#94A3B8">
    Temporary visual placeholder
  </text>
</svg>
